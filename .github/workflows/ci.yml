name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [bot, parser, userbot, api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build ${{ matrix.service }}
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o ./bin/${{ matrix.service }} ./cmd/${{ matrix.service }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-binary
          path: ./bin/${{ matrix.service }}
          retention-days: 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [build]
    strategy:
      matrix:
        service: [bot, parser, userbot, api]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image - ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: .
          build-args: SERVICE=${{ matrix.service }}
          tags: rss-reader:${{ matrix.service }}-${{ github.sha }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
