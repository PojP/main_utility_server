services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rssreader
      POSTGRES_USER: rssreader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rssreader}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rssreader"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"

  bot:
    build:
      context: .
      args:
        SERVICE: bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DATABASE_URL: postgres://rssreader:${POSTGRES_PASSWORD:-rssreader}@postgres:5432/rssreader?sslmode=disable
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OBSIDIAN_VAULT_PATH: /obsidian
    volumes:
      # Mount your Obsidian vault here.
      # Set OBSIDIAN_VAULT_HOST_PATH in .env to the path on your host machine.
      # Example: OBSIDIAN_VAULT_HOST_PATH=/home/user/Documents/MyVault
      - ${OBSIDIAN_VAULT_HOST_PATH:-./obsidian-inbox}:/obsidian

  parser:
    build:
      context: .
      args:
        SERVICE: parser
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgres://rssreader:${POSTGRES_PASSWORD:-rssreader}@postgres:5432/rssreader?sslmode=disable
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      NOTIFY_CHAT_ID: ${NOTIFY_CHAT_ID:-}
      PARSE_INTERVAL_MIN: ${PARSE_INTERVAL_MIN:-15}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen-2.5-72b-instruct:free}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      QDRANT_URL: http://qdrant:6333

  userbot:
    build:
      context: .
      args:
        SERVICE: userbot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgres://rssreader:${POSTGRES_PASSWORD:-rssreader}@postgres:5432/rssreader?sslmode=disable
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      TG_PHONE: ${TG_PHONE:-}
      TG_2FA_PASSWORD: ${TG_2FA_PASSWORD:-}
      TG_SESSION_PATH: /data/userbot.session
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      NOTIFY_CHAT_ID: ${NOTIFY_CHAT_ID:-}
      PARSE_INTERVAL_MIN: ${PARSE_INTERVAL_MIN:-15}
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: news-images
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen-2.5-72b-instruct:free}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
    volumes:
      - userbotdata:/data
    stdin_open: true
    tty: true

  api:
    build:
      context: .
      args:
        SERVICE: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://rssreader:${POSTGRES_PASSWORD:-rssreader}@postgres:5432/rssreader?sslmode=disable
      API_ADDR: ":8080"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OBSIDIAN_VAULT_PATH: ""
      QDRANT_URL: http://qdrant:6333

volumes:
  pgdata:
  miniodata:
  userbotdata:
  qdrantdata:
